<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Should you hang out your washing today? — Clothesline Weather Advisor</title>
  <meta name="description" content="Quick, plain advice on whether today's weather will dry your clothes outside. Uses rain, showers, snowfall, wind and relative humidity.">
  <meta property="og:title" name="twitter:title" content="Should you hang out your washing today?">
  <meta property="og:description" name="twitter:description" content="Quick, plain advice on whether today's weather will dry your clothes outside.">
  <meta property="og:image" name="twitter:image" content="/assets/preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://your-username.github.io/clothesline">

  <style>
    :root{
      --max-width:75rem; /* ~1200px */
      --gap:1rem;
      --side-width:22.5rem; /* ~360px */
      --good-bg:#e6ffea;
      --bad-bg:#fff0f0;
      --fair-bg:#fff7e6;
      --text:#111;
      --muted:#555;
      --radius:0.375rem; /* 6px */
      --card-pad:0.6rem;
      --base:1rem; /* 16px */
      --focus-color:#2ecc71;
    }

    html{font-size:100%}
    body{
      font-family: Seravek, 'Gill Sans Nova', Ubuntu, Cadara, 'DejaVu Sans', source-sans-pro, sans-serif;
      color:var(--text);
      margin:0;
      background:#fafafa;
      line-height:1.45;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* Page shell */
    .page{
      width:100%;
      max-width:var(--max-width);
      margin:0 auto;
      padding:1rem;
      box-sizing:border-box;
      display:grid;
      grid-template-columns: 1fr var(--side-width);
      gap:var(--gap);
      align-items:start;
    }

    header.site-header{
      grid-column:1 / -1;
      margin-bottom:0.5rem;
    }

    h1{
      font-size:clamp(1.5rem, 2.2vw, 2rem); /* 24-32px */
      margin:0;
      line-height:1.05;
    }
    .lead{
      margin:0.35rem 0 0 0;
      color:var(--muted);
      font-size:0.9375rem; /* 15px */
    }
    .best-window{
      margin:0.5rem 0 0 0;
      font-size:0.95rem;
      color:var(--muted);
    }

    /* Controls */
    .controls{
      display:flex;
      gap:0.5rem;
      align-items:center;
      margin:0.75rem 0;
      flex-wrap:wrap;
    }
    .controls label{font-size:0.875rem}
    .controls .input-wrap{display:flex;gap:0.5rem;align-items:center}
    input[type="text"]{
      height:2.5rem; /* 2.5rem = 40px */
      padding:0.5rem 0.6rem;
      border:0.0625rem solid #ccc;
      border-radius:var(--radius);
      font-size:1rem;
      min-width:18rem;
      box-sizing:border-box;
    }
    button{
      height:2.5rem;
      padding:0 0.75rem;
      border-radius:var(--radius);
      border:0.0625rem solid #bbb;
      background:#fff;
      cursor:pointer;
      font-size:0.95rem;
    }
    /* Focus styles */
    :focus{outline:none}
    input[type="text"]:focus, button:focus {
      box-shadow:0 0 0 0.25rem rgba(46,204,113,0.15);
      border-color:var(--focus-color);
    }

    /* Main and sidebar */
    main.main-col{min-width:0}
    aside.side-col{
      background:#fff;
      border-radius:var(--radius);
      padding:0.75rem;
      box-shadow:0 0.125rem 0.375rem rgba(0,0,0,0.06);
      align-self:start;
    }
    .side-col h2{font-size:1rem;margin:0 0 0.5rem 0}

    /* Day cards */
    h2.verdict{
      font-size:1.0625rem; /* 17px */
      margin:0.75rem 0 0.25rem 0;
    }
    .card{
      padding:var(--card-pad);
      border-radius:0.5rem;
      margin:0.5rem 0;
      box-sizing:border-box;
    }
    .card.good{background:var(--good-bg); border-left:0.375rem solid #2ecc71}
    .card.bad{background:var(--bad-bg); border-left:0.375rem solid #e74c3c}
    .card.fair{background:var(--fair-bg); border-left:0.375rem solid #f39c12}
    .card ul{margin:0.35rem 0 0 1.2rem;padding:0;color:var(--muted);font-size:0.9375rem}
    .card li{margin:0.25rem 0; list-style:disc inside}

    /* Details and hourly rows */
    details{margin-top:0.5rem}
    summary{cursor:pointer;font-weight:600;font-size:0.95rem}
    .meta{color:var(--muted);font-size:0.9rem;margin-top:0.5rem}
    .hour-row{display:flex;justify-content:space-between;gap:0.5rem;padding:0.4rem 0;border-bottom:0.0625rem solid rgba(0,0,0,0.03)}
    .hour-row:last-child{border-bottom:0}
    .hour-left{font-weight:600}
    .hour-right{color:var(--muted);font-size:0.9rem}

    /* No-JS message */
    .no-js{
      background:#fffbe6;
      border-left:0.375rem solid #f39c12;
      padding:0.6rem;
      border-radius:var(--radius);
      margin:0.5rem 0;
      color:#6a4b00;
      font-size:0.95rem;
    }
    .no-js a{color:#6a4b00; text-decoration:underline}

    /* Responsive breakpoints */
    @media (max-width:64rem){ /* ~1024px */
      :root{--side-width:20rem}
      .page{grid-template-columns:1fr var(--side-width)}
    }

    @media (max-width:48rem){ /* ~768px and below: stack */
      .page{
        grid-template-columns:1fr;
        padding:0.75rem;
      }
      aside.side-col{order:2;margin-top:0.75rem}
      main.main-col{order:1}
      input[type="text"]{min-width:12rem;width:100%}
      .controls{flex-direction:column;align-items:stretch}
      button{width:100%}
    }

    @media (prefers-reduced-motion: reduce){
      *{transition:none!important}
    }
  </style>
</head>
<body>
  <div class="page" role="document">
    <header class="site-header" role="banner">
      <h1>Should you hang out your washing today?</h1>
      <p class="lead">Quick, plain advice on whether today’s weather will dry your clothes outside.</p>
      <p id="weeklySummary" class="best-window" aria-live="polite"></p>
    </header>

    <main class="main-col" role="main" aria-live="polite">
      <div class="controls" aria-label="Location controls">
        <div class="input-wrap">
          <label for="place">Search place or postcode</label>
          <input id="place" type="text" placeholder="e.g. Dublin, Ireland or D02" autocomplete="off" aria-label="Search place or postcode">
        </div>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <button id="useLoc" type="button">Use my location</button>
          <button id="check" type="button">Check</button>
        </div>
      </div>

      <noscript>
        <div class="no-js" role="status">
          This page requires JavaScript to fetch weather forecasts. To learn what enabling JavaScript means and how to turn it on in your browser, see
          <a href="https://developer.mozilla.org/en-US/docs/Learn/Tools_and_testing/Client-side_JavaScript_frameworks/What_is_JavaScript" target="_blank" rel="noopener noreferrer">What is JavaScript?</a>
        </div>
      </noscript>

      <section id="periodSummaries" aria-label="Day summaries">
        <!-- Day-by-day H2 headings and bullet lists will be injected here by JavaScript -->
      </section>
    </main>

    <aside class="side-col" aria-label="Hourly timeline and details">
      <h2>Hourly timeline (details)</h2>
      <div id="results">Loading…</div>
    </aside>
  </div>

  <script>
    // Formatting helpers
    function formatTime12(date) {
      const timeStr = date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit', hour12: true });
      return timeStr.replace(/\s?([AP]M)$/, m => {
        const s = m.trim().toLowerCase();
        return ' ' + s.replace('am','a.m.').replace('pm','p.m.');
      });
    }
    function formatDay(date) {
      return date.toLocaleDateString(undefined, { weekday: 'long' });
    }
    function timeOfDayLabel(hourIso) {
      const h = new Date(hourIso).getHours();
      if (h >= 6 && h < 12) return 'morning';
      if (h >= 12 && h < 17) return 'late morning–early afternoon';
      if (h >= 17 && h < 21) return 'evening';
      return 'night';
    }

    // Decision rule: sum rain + showers + snowfall for primary check
    function isGoodHour(rainMm, showersMm, snowfallMm, windMs, rhPct) {
      const totalPrecip = (rainMm || 0) + (showersMm || 0) + (snowfallMm || 0);
      return totalPrecip < 0.2 && (windMs || 0) < 6 && (rhPct || 0) < 70;
    }

    // Fetch helpers
    async function geocode(query) {
      const url = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(query) + '&count=6&language=en&format=json';
      const r = await fetch(url);
      if (!r.ok) throw new Error('Geocoding failed');
      return r.json();
    }
    async function fetchForecast(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=rain,showers,snowfall,windspeed_10m,relativehumidity_2m&forecast_days=7&timezone=auto`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('Weather fetch failed');
      return r.json();
    }

    // Helper: determine day verdict
    function dayVerdictForDate(dateIso, times, goodFlags) {
      const start = dateIso + 'T06:00';
      const end = dateIso + 'T20:00';
      let count = 0;
      for (let i = 0; i < times.length; i++) {
        if (times[i] >= start && times[i] < end && goodFlags[i]) count++;
      }
      return { goodHours: count, verdict: count >= 4 ? 'Good' : 'Bad' };
    }

    // Helper: find best contiguous good window within a day's indices
    function findBestWindow(indices, times, goodFlags) {
      // Find contiguous runs of good hours within the provided indices
      const runs = [];
      let runStart = null;
      for (let j = 0; j < indices.length; j++) {
        const i = indices[j];
        if (goodFlags[i]) {
          if (runStart === null) runStart = i;
        } else {
          if (runStart !== null) {
            runs.push({ start: runStart, end: indices[j - 1] });
            runStart = null;
          }
        }
      }
      if (runStart !== null) runs.push({ start: runStart, end: indices[indices.length - 1] });

      if (runs.length === 0) return 'No good window';
      // Choose the longest run
      runs.sort((a, b) => (b.end - b.start) - (a.end - a.start));
      const best = runs[0];
      const start = new Date(times[best.start]);
      const end = new Date(times[best.end]);
      return `${formatTime12(start)} – ${formatTime12(end)}`;
    }

    // Find good periods across 7 days for weekly summary
    function findGoodPeriods7Days(times, goodFlags) {
      const windows = [];
      let i = 0;
      while (i < times.length) {
        if (!goodFlags[i]) { i++; continue; }
        let start = i;
        let end = i;
        while (end + 1 < times.length && goodFlags[end + 1]) end++;
        windows.push({ startIndex: start, endIndex: end });
        i = end + 1;
      }
      // Merge windows separated by <= 2 hours
      const merged = [];
      for (const w of windows) {
        if (merged.length === 0) { merged.push(w); continue; }
        const prev = merged[merged.length - 1];
        const gapHours = (new Date(times[w.startIndex]) - new Date(times[prev.endIndex])) / (1000 * 60 * 60);
        if (gapHours <= 2) {
          prev.endIndex = w.endIndex;
        } else {
          merged.push(w);
        }
      }
      return merged.map(w => {
        const startIso = times[w.startIndex];
        const endIso = times[w.endIndex];
        const startDay = formatDay(new Date(startIso));
        const endDay = formatDay(new Date(endIso));
        const startTod = timeOfDayLabel(startIso);
        const endTod = timeOfDayLabel(endIso);
        if (startDay === endDay) {
          return `${startDay} ${startTod}`;
        }
        return `from ${startDay} ${startTod} until ${endDay} ${endTod}`;
      });
    }

    function generateWeeklySummary(times, goodFlags) {
      const periods = findGoodPeriods7Days(times, goodFlags);
      if (!periods || periods.length === 0) return 'No reliably dry windows are forecast this week.';
      const top = periods.slice(0, 3);
      if (top.length === 1) return `Best time this week: ${top[0]}.`;
      if (top.length === 2) return `Best times this week: ${top[0]} and ${top[1]}.`;
      return `Best times this week: ${top[0]}, ${top[1]}, and ${top[2]}.`;
    }

    // Render day summaries as bullet lists
    function renderDaySummaries(times, rain, showers, snowfall, wind, rh, goodFlags) {
      const container = document.getElementById('periodSummaries');
      container.innerHTML = '';

      const maxHours = Math.min(times.length, 7 * 24);
      const days = {};
      for (let i = 0; i < maxHours; i++) {
        const d = new Date(times[i]);
        const dayKey = d.toISOString().slice(0,10);
        if (!days[dayKey]) days[dayKey] = [];
        days[dayKey].push(i);
      }

      const todayIso = new Date().toISOString().slice(0,10);
      const tomorrowIso = new Date(Date.now() + 24*60*60*1000).toISOString().slice(0,10);

      Object.keys(days).forEach(dayKey => {
        const indices = days[dayKey];
        const dayName = formatDay(new Date(times[indices[0]]));

        const labelPrefix =
          dayKey === todayIso ? 'Today is' :
          dayKey === tomorrowIso ? 'Tomorrow is' :
          `${dayName} is`;

        // Compute summary stats
        let totalPrecip = 0;
        let maxWind = 0;
        let sumRh = 0;

        indices.forEach(i => {
          totalPrecip += (rain[i] || 0) + (showers[i] || 0) + (snowfall[i] || 0);
          if ((wind[i] || 0) > maxWind) maxWind = wind[i];
          sumRh += (rh[i] || 0);
        });

        const avgRh = Math.round(sumRh / indices.length || 0);
        const dayGoodInfo = dayVerdictForDate(dayKey, times, goodFlags);
        const verdictText = dayGoodInfo.verdict === 'Good'
          ? 'good for hanging out clothes.'
          : 'bad for hanging out clothes.';

        // Create card
        const card = document.createElement('div');
        card.className =
          'card ' +
          (dayGoodInfo.verdict === 'Good'
            ? 'good'
            : (totalPrecip >= 0.2 ? 'bad' : (maxWind >= 6 ? 'fair' : 'bad')));

        // Heading
        const h2 = document.createElement('h2');
        h2.className = 'verdict';
        h2.textContent = `${labelPrefix} ${verdictText}`;
        container.appendChild(h2);

        // Bullet list
        const ul = document.createElement('ul');

        // Precipitation
        const li1 = document.createElement('li');
        li1.textContent = `☔️ Total precipitation: ${totalPrecip.toFixed(1)} mm`;
        ul.appendChild(li1);

        // Wind
        const li2 = document.createElement('li');
        li2.textContent = `💨 Wind: ${maxWind.toFixed(1)} m/s`;
        ul.appendChild(li2);

        // Humidity
        const li3 = document.createElement('li');
        li3.textContent = `💧 Relative humidity: ${avgRh}%`;
        ul.appendChild(li3);

        // Best window or reason
        const li4 = document.createElement('li');
        if (dayGoodInfo.verdict === 'Good') {
          li4.textContent = `👍 Best window: ${findBestWindow(indices, times, goodFlags)}`;
        } else {
          if (totalPrecip >= 0.2) {
            li4.textContent = `⚠️ Rain likely — outdoor drying unreliable`;
          } else if (maxWind >= 6) {
            li4.textContent = `⚠️ Strong wind — secure lighter items`;
          } else {
            li4.textContent = `⚠️ High humidity may slow drying`;
          }
        }
        ul.appendChild(li4);

        card.appendChild(ul);
        container.appendChild(card);

        // Hourly details
        const details = document.createElement('details');
        details.open = false;

        const summary = document.createElement('summary');
        summary.textContent = `Show hourly details for ${dayName}`;
        details.appendChild(summary);

        const list = document.createElement('div');
        list.className = 'meta';

        indices.forEach(i => {
          const d = new Date(times[i]);
          const timeLabel = `${formatTime12(d)}`;
          const totalPrecipHour =
            ((rain && rain[i]) || 0) +
            ((showers && showers[i]) || 0) +
            ((snowfall && snowfall[i]) || 0);

          const row = document.createElement('div');
          row.className = 'hour-row';
          row.innerHTML =
            `<div class="hour-left"><strong>${timeLabel}</strong></div>` +
            `<div class="hour-right">☔️ ${totalPrecipHour.toFixed(1)} mm · ` +
            `💨 ${wind[i]} m/s · relative humidity ${rh[i]}% · ` +
            `${goodFlags[i] ? 'Good' : 'Poor'}</div>`;

          list.appendChild(row);
        });

        details.appendChild(list);
        container.appendChild(details);
      });
    }

    function renderHourlyTimelineByDay(times, rain, showers, snowfall, wind, rh, goodFlags) {
      const results = document.getElementById('results');
      results.innerHTML = '';
      const maxHours = Math.min(times.length, 7 * 24);
      const days = {};
      for (let i = 0; i < maxHours; i++) {
        const d = new Date(times[i]);
        const dayKey = d.toISOString().slice(0,10);
        if (!days[dayKey]) days[dayKey] = [];
        days[dayKey].push(i);
      }

      Object.keys(days).forEach(dayKey => {
        const indices = days[dayKey];
        const first = indices[0];
        const dayName = formatDay(new Date(times[first]));
        const details = document.createElement('details');
        details.open = false;
        const summary = document.createElement('summary');
        summary.textContent = `${dayName} hourly details`;
        details.appendChild(summary);

        const list = document.createElement('div');
        list.className = 'meta';
        indices.forEach(i => {
          const d = new Date(times[i]);
          const timeLabel = `${formatTime12(d)}`;
          const totalPrecip = ((rain && rain[i]) || 0) + ((showers && showers[i]) || 0) + ((snowfall && snowfall[i]) || 0);
          const precipLabel = `☔️ ${totalPrecip.toFixed(1)} mm`;
          const windLabel = `💨 ${wind[i]} m/s`;
          const rhLabel = `relative humidity ${rh[i]}%`;
          const status = goodFlags[i] ? 'Good' : 'Poor';
          const row = document.createElement('div');
          row.className = 'hour-row';
          row.innerHTML = `<div class="hour-left"><strong>${timeLabel}</strong></div><div class="hour-right">${precipLabel} · ${windLabel} · ${rhLabel} · ${status}</div>`;
          list.appendChild(row);
        });

        details.appendChild(list);
        results.appendChild(details);
      });
    }

    // Main evaluation
    function evaluateForecastAndRender(data, label) {
      const times = data.hourly.time;
      const rain = data.hourly.rain || [];
      const showers = data.hourly.showers || [];
      const snowfall = data.hourly.snowfall || [];
      const wind = data.hourly.windspeed_10m || [];
      const rh = data.hourly.relativehumidity_2m || [];

      const goodFlags = times.map((t, i) => isGoodHour(rain[i], showers[i], snowfall[i], wind[i], rh[i]));

      // weekly summary (one sentence)
      const weeklySummaryEl = document.getElementById('weeklySummary');
      weeklySummaryEl.textContent = generateWeeklySummary(times, goodFlags);

      renderDaySummaries(times, rain, showers, snowfall, wind, rh, goodFlags);
      renderHourlyTimelineByDay(times, rain, showers, snowfall, wind, rh, goodFlags);
    }

    // UI wiring
    const placeInput = document.getElementById('place');
    const suggestionsEl = document.createElement('div');
    suggestionsEl.id = 'suggestions';
    suggestionsEl.style.marginTop = '0.5rem';
    document.querySelector('.controls').appendChild(suggestionsEl);

    function debounce(fn, ms=300){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

    const doSuggest = debounce(async () => {
      const q = placeInput.value.trim();
      suggestionsEl.innerHTML = '';
      if (!q) return;
      try {
        const geo = await geocode(q);
        if (!geo.results || geo.results.length === 0) {
          suggestionsEl.textContent = 'No matches';
          return;
        }
        geo.results.forEach(r => {
          const div = document.createElement('div');
          div.style.padding = '0.4rem';
          div.style.cursor = 'pointer';
          div.textContent = r.name + (r.admin1 ? ', ' + r.admin1 : '') + (r.country ? ', ' + r.country : '');
          div.onclick = () => {
            placeInput.value = div.textContent;
            suggestionsEl.innerHTML = '';
            fetchForecast(r.latitude, r.longitude).then(data => evaluateForecastAndRender(data, div.textContent)).catch(e => alert(e.message));
          };
          suggestionsEl.appendChild(div);
        });
      } catch (e) {
        suggestionsEl.textContent = 'Lookup error';
      }
    }, 300);

    placeInput.addEventListener('input', doSuggest);

    document.getElementById('useLoc').onclick = () => {
      if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser.');
        return;
      }
      navigator.geolocation.getCurrentPosition(p => {
        const lat = p.coords.latitude.toFixed(4);
        const lon = p.coords.longitude.toFixed(4);
        fetchForecast(lat, lon).then(data => evaluateForecastAndRender(data, 'Your location')).catch(e => alert(e.message));
      }, err => {
        alert('Location denied or unavailable');
      });
    };

    document.getElementById('check').onclick = () => {
      const q = placeInput.value.trim();
      if (!q) {
        // Default to Dublin coordinates
        fetchForecast(53.3498, -6.2603).then(data => evaluateForecastAndRender(data, 'Dublin, Ireland')).catch(e => alert(e.message));
        return;
      }
      const coordMatch = q.match(/^(-?\d+(\.\d+)?)[, ]+\s*(-?\d+(\.\d+)?)$/);
      if (coordMatch) {
        fetchForecast(coordMatch[1], coordMatch[3]).then(data => evaluateForecastAndRender(data, q)).catch(e => alert(e.message));
        return;
      }
      geocode(q).then(geo => {
        if (geo.results && geo.results.length > 0) {
          const r = geo.results[0];
          fetchForecast(r.latitude, r.longitude).then(data => evaluateForecastAndRender(data, r.name + (r.admin1 ? ', ' + r.admin1 : '') + (r.country ? ', ' + r.country : ''))).catch(e => alert(e.message));
        } else {
          alert('Place not found. Try a nearby town or postcode.');
        }
      }).catch(() => alert('Geocoding failed'));
    };

    // Auto-run default on load (Dublin)
    window.addEventListener('load', () => {
      placeInput.value = 'Dublin, Ireland';
      document.getElementById('check').click();
    });
  </script>
</body>
</html>
