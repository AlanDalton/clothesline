<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Should you hang out your washing today? — Clothesline Weather Advisor</title>
  <meta name="description" content="Quick, plain advice on whether today's weather will dry your clothes outside. Uses rain, showers, snowfall, wind and relative humidity.">
  <meta property="og:title" content="Should you hang out your washing today?">
  <meta name="twitter:title" content="Should you hang out your washing today?">
  <meta property="og:description" content="Quick, plain advice on whether today's weather will dry your clothes outside.">
  <meta name="twitter:description" content="Quick, plain advice on whether today's weather will dry your clothes outside.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://alandalton.github.io/clothesline/">

  <style>
    :root{
      --max-width:75rem;
      --gap:1rem;
      --good-bg:#e6ffea;
      --bad-bg:#fff0f0;
      --fair-bg:#fff7e6;
      --text:#111;
      --muted:#555;
      --radius:0.375rem;
      --card-pad:0.6rem;
      --base:1rem;
      --focus-color:#2ecc71;
      --primary:#2ecc71;
    }

    html{font-size:100%}
    body{
      font-family: Seravek, 'Gill Sans Nova', Ubuntu, Cadara, 'DejaVu Sans', source-sans-pro, sans-serif;
      color:var(--text);
      margin:0;
      background:#fafafa;
      line-height:1.45;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .page{
      width:100%;
      max-width:var(--max-width);
      margin:0 auto;
      padding:1rem;
      box-sizing:border-box;
      display:block;
    }

    header.site-header{
      margin-bottom:1rem;
    }

    h1{
      font-size:clamp(1.5rem, 2.2vw, 2rem);
      margin:0;
      line-height:1.05;
    }
    .lead{
      margin:0.6rem 0 0 0;
      color:var(--muted);
      font-size:0.98rem;
      max-width:60ch;
    }

    /* Controls: Use my location first, then manual input group */
    .controls{
      display:flex;
      gap:0.75rem;
      align-items:flex-start;
      margin:1.25rem 0;
      flex-wrap:wrap;
    }
    .controls .col{min-width:0}
    .btn {
      height:2.5rem;
      padding:0 0.75rem;
      border-radius:var(--radius);
      border:0.0625rem solid #bbb;
      background:#fff;
      cursor:pointer;
      font-size:0.95rem;
    }
    .btn-primary {
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
      box-shadow:0 1px 0 rgba(0,0,0,0.03);
    }
    .input-wrap{display:flex;gap:0.5rem;align-items:center;flex:1;min-width:0}
    label{font-size:0.95rem;display:block;margin-bottom:0.25rem}
    input[type="text"]{
      height:2.5rem;
      padding:0.5rem 0.6rem;
      border:0.0625rem solid #ccc;
      border-radius:var(--radius);
      font-size:1rem;
      min-width:0;
      width:100%;
      box-sizing:border-box;
      background:#fff;
    }
    .muted-note{font-size:0.9rem;color:var(--muted);margin-top:0.35rem}

    :focus{outline:none}
    input[type="text"]:focus, .btn:focus {
      box-shadow:0 0 0 0.25rem rgba(46,204,113,0.12);
      border-color:var(--focus-color);
    }

    /* Combined weekly summary + location: visually prominent and placed below controls */
    .weekly-summary{
      margin-top:1rem;
      padding:0.9rem 1rem;
      background:#ffffff;
      border-radius:0.5rem;
      box-shadow:0 0.125rem 0.375rem rgba(0,0,0,0.04);
      border-left:0.375rem solid var(--primary);
      font-size:1rem;
      color:var(--muted);
      max-width:70ch;
    }
    .weekly-summary h3{
      margin:0 0 0.5rem 0;
      font-size:1rem;
      color:var(--text);
      font-weight:600;
    }
    .weekly-summary ul{margin:0;padding-left:1.2rem}
    .weekly-summary li{margin:0.35rem 0}
    .weekly-summary li strong{font-weight:700;color:var(--text)}

    /* Day cards: more space between them */
    .day-list{margin-top:1rem}
    h2.verdict{
      font-size:1.0625rem;
      margin:0.75rem 0 0.25rem 0;
    }
    .card{
      padding:var(--card-pad);
      border-radius:0.5rem;
      margin:1.25rem 0; /* increased spacing between days */
      box-sizing:border-box;
    }
    .card.good{background:var(--good-bg); border-left:0.375rem solid #2ecc71}
    .card.bad{background:var(--bad-bg); border-left:0.375rem solid #e74c3c}
    .card.fair{background:var(--fair-bg); border-left:0.375rem solid #f39c12}
    .card ul{margin:0.35rem 0 0 1.2rem;padding:0;color:var(--muted);font-size:0.95rem}
    .card li{margin:0.35rem 0; list-style:disc inside}

    /* Details: summary is secondary (not bold) */
    details{margin-top:0.5rem}
    summary{cursor:pointer;font-weight:400;font-size:0.95rem;color:var(--muted)}
    .meta{color:var(--muted);font-size:0.9rem;margin-top:0.5rem}
    .hour-row{display:flex;justify-content:space-between;gap:0.5rem;padding:0.4rem 0;border-bottom:0.0625rem solid rgba(0,0,0,0.03)}
    .hour-row:last-child{border-bottom:0}
    .hour-left{font-weight:600}
    .hour-right{color:var(--muted);font-size:0.9rem}

    #suggestions{margin-top:0.5rem;color:var(--muted);font-size:0.95rem}

    .no-js{
      background:#fffbe6;
      border-left:0.375rem solid #f39c12;
      padding:0.6rem;
      border-radius:var(--radius);
      margin:0.5rem 0;
      color:#6a4b00;
      font-size:0.95rem;
    }
    .no-js a{color:#6a4b00; text-decoration:underline}

    @media (max-width:48rem){
      .controls{flex-direction:column;align-items:stretch}
      .btn{width:100%}
      .btn-primary{order:-1}
    }
    @media (prefers-reduced-motion: reduce){
      *{transition:none!important}
    }
  </style>
</head>
<body>
  <div class="page" role="document">
    <header class="site-header" role="banner">
      <h1>Should you hang out your washing today?</h1>
      <p class="lead">Quick, plain advice on whether today’s weather will dry your clothes outside.</p>
    </header>

    <main role="main" aria-live="polite">
      <!-- Controls: Use my location is visually and structurally first -->
      <div class="controls" aria-label="Location controls">
        <div class="col" style="flex-basis:18rem;flex-shrink:0">
          <button id="useLoc" class="btn btn-primary" type="button" aria-describedby="useLocNote">Use my location</button>
          <div id="useLocNote" class="muted-note">Allow the browser to detect your location. This is the quickest option.</div>
        </div>

        <div class="col" style="flex:1;min-width:0">
          <div style="display:flex;gap:0.5rem;align-items:flex-start">
            <div style="flex:1;min-width:0">
              <label for="place">Check another location:</label>
              <input id="place" type="text" placeholder="Town, postcode, or coordinates" autocomplete="off" aria-label="Check another location">
              <div id="suggestions" aria-hidden="false"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Combined weekly summary + location: hidden until a location is chosen -->
      <section id="weeklySummary" class="weekly-summary" aria-live="polite" hidden>
        <h3 id="weeklyHeading">Best times this week for hanging out clothes in <span id="locationName">—</span>:</h3>
        <ul id="weeklyList" aria-live="polite">
          <!-- Bullet points with bold text will be injected here -->
        </ul>
      </section>

      <noscript>
        <div class="no-js" role="status">
          This page requires JavaScript to fetch weather forecasts. To learn what enabling JavaScript means and how to turn it on in your browser, see
          <a href="https://developer.mozilla.org/en-US/docs/Learn/Tools_and_testing/Client-side_JavaScript_frameworks/What_is_JavaScript" target="_blank" rel="noopener noreferrer">What is JavaScript?</a>
        </div>
      </noscript>

      <section id="periodSummaries" class="day-list" aria-label="Day summaries">
        <!-- Day-by-day H2 headings and bullet lists will be injected here by JavaScript -->
      </section>
    </main>
  </div>

  <script>
    // Formatting helpers
    function formatTime12(date) {
      const timeStr = date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit', hour12: true });
      return timeStr.replace(/\s?([AP]M)$/, m => {
        const s = m.trim().toLowerCase();
        return ' ' + s.replace('am','a.m.').replace('pm','p.m.');
      });
    }
    function formatDay(date) {
      return date.toLocaleDateString(undefined, { weekday: 'long' });
    }
    function timeOfDayLabel(hourIso) {
      const h = new Date(hourIso).getHours();
      if (h >= 6 && h < 12) return 'morning';
      if (h >= 12 && h < 17) return 'late morning–early afternoon';
      if (h >= 17 && h < 21) return 'evening';
      return 'night';
    }

    // Decision rule
    function isGoodHour(rainMm, showersMm, snowfallMm, windMs, rhPct) {
      const totalPrecip = (rainMm || 0) + (showersMm || 0) + (snowfallMm || 0);
      return totalPrecip < 0.2 && (windMs || 0) < 6 && (rhPct || 0) < 70;
    }

    // Fetch helpers
    async function geocode(query) {
      const url = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(query) + '&count=6&language=en&format=json';
      const r = await fetch(url);
      if (!r.ok) throw new Error('Geocoding failed');
      return r.json();
    }
    async function fetchForecast(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=rain,showers,snowfall,windspeed_10m,relativehumidity_2m&forecast_days=7&timezone=auto`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('Weather fetch failed');
      return r.json();
    }

    // Reverse geocode: lat,lon -> friendly place label
    async function reverseGeocode(lat, lon) {
      try {
        const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&count=1&language=en&format=json`;
        const r = await fetch(url);
        if (!r.ok) throw new Error('Reverse geocoding failed');
        const json = await r.json();
        if (json && json.results && json.results.length > 0) {
          const r0 = json.results[0];
          // Build a friendly label: prefer locality name, then admin1, then country
          const parts = [];
          if (r0.name) parts.push(r0.name);
          if (r0.admin1 && r0.admin1 !== r0.name) parts.push(r0.admin1);
          if (r0.country && !parts.includes(r0.country)) parts.push(r0.country);
          return parts.join(', ');
        }
      } catch (e) {
        // silent fallback handled by caller
      }
      return null;
    }

    // Day verdict helper
    function dayVerdictForDate(dateIso, times, goodFlags) {
      const start = dateIso + 'T06:00';
      const end = dateIso + 'T20:00';
      let count = 0;
      for (let i = 0; i < times.length; i++) {
        if (times[i] >= start && times[i] < end && goodFlags[i]) count++;
      }
      return { goodHours: count, verdict: count >= 4 ? 'Good' : 'Bad' };
    }

    // Best window helper
    function findBestWindow(indices, times, goodFlags) {
      const runs = [];
      let runStart = null;
      for (let j = 0; j < indices.length; j++) {
        const i = indices[j];
        if (goodFlags[i]) {
          if (runStart === null) runStart = i;
        } else {
          if (runStart !== null) {
            runs.push({ start: runStart, end: indices[j - 1] });
            runStart = null;
          }
        }
      }
      if (runStart !== null) runs.push({ start: runStart, end: indices[indices.length - 1] });

      if (runs.length === 0) return 'No good window';
      runs.sort((a, b) => (b.end - b.start) - (a.end - a.start));
      const best = runs[0];
      const start = new Date(times[best.start]);
      const end = new Date(times[best.end]);
      return `${formatTime12(start)} – ${formatTime12(end)}`;
    }

    // Weekly summary helper
    function findGoodPeriods7Days(times, goodFlags) {
      const windows = [];
      let i = 0;
      while (i < times.length) {
        if (!goodFlags[i]) { i++; continue; }
        let start = i;
        let end = i;
        while (end + 1 < times.length && goodFlags[end + 1]) end++;
        windows.push({ startIndex: start, endIndex: end });
        i = end + 1;
      }
      const merged = [];
      for (const w of windows) {
        if (merged.length === 0) { merged.push(w); continue; }
        const prev = merged[merged.length - 1];
        const gapHours = (new Date(times[w.startIndex]) - new Date(times[prev.endIndex])) / (1000 * 60 * 60);
        if (gapHours <= 2) {
          prev.endIndex = w.endIndex;
        } else {
          merged.push(w);
        }
      }
      return merged.map(w => {
        const startIso = times[w.startIndex];
        const endIso = times[w.endIndex];
        const startDay = formatDay(new Date(startIso));
        const endDay = formatDay(new Date(endIso));
        const startTod = timeOfDayLabel(startIso);
        const endTod = timeOfDayLabel(endIso);
        if (startDay === endDay) {
          return `${startDay} ${startTod}`;
        }
        return `from ${startDay} ${startTod} until ${endDay} ${endTod}`;
      });
    }

    // Render weekly list as bold bullet points
    function renderWeeklyList(locationLabel, times, goodFlags) {
      const weeklySection = document.getElementById('weeklySummary');
      const locationName = document.getElementById('locationName');
      const listEl = document.getElementById('weeklyList');

      const periods = findGoodPeriods7Days(times, goodFlags);
      locationName.textContent = locationLabel || 'Unknown location';

      // Build list items
      listEl.innerHTML = '';
      if (!periods || periods.length === 0) {
        const li = document.createElement('li');
        li.innerHTML = '<strong>No reliably dry windows are forecast this week.</strong>';
        listEl.appendChild(li);
      } else {
        periods.forEach(p => {
          const li = document.createElement('li');
          li.innerHTML = `<strong>${p}</strong>`;
          listEl.appendChild(li);
        });
      }

      // Reveal the combined summary
      weeklySection.hidden = false;
    }

    // Render day summaries as bullet lists (with increased spacing)
    function renderDaySummaries(times, rain, showers, snowfall, wind, rh, goodFlags) {
      const container = document.getElementById('periodSummaries');
      container.innerHTML = '';

      const maxHours = Math.min(times.length, 7 * 24);
      const days = {};
      for (let i = 0; i < maxHours; i++) {
        const d = new Date(times[i]);
        const dayKey = d.toISOString().slice(0,10);
        if (!days[dayKey]) days[dayKey] = [];
        days[dayKey].push(i);
      }

      const todayIso = new Date().toISOString().slice(0,10);
      const tomorrowIso = new Date(Date.now() + 24*60*60*1000).toISOString().slice(0,10);

      Object.keys(days).forEach(dayKey => {
        const indices = days[dayKey];
        const dayName = formatDay(new Date(times[indices[0]]));

        const labelPrefix =
          dayKey === todayIso ? 'Today is' :
          dayKey === tomorrowIso ? 'Tomorrow is' :
          `${dayName} is`;

        // Compute summary stats
        let totalPrecip = 0;
        let maxWind = 0;
        let sumRh = 0;

        indices.forEach(i => {
          totalPrecip += (rain[i] || 0) + (showers[i] || 0) + (snowfall[i] || 0);
          if ((wind[i] || 0) > maxWind) maxWind = wind[i];
          sumRh += (rh[i] || 0);
        });

        const avgRh = Math.round(sumRh / indices.length || 0);
        const dayGoodInfo = dayVerdictForDate(dayKey, times, goodFlags);
        const verdictText = dayGoodInfo.verdict === 'Good'
          ? 'good for hanging out clothes.'
          : 'bad for hanging out clothes.';

        // Create card
        const card = document.createElement('div');
        card.className =
          'card ' +
          (dayGoodInfo.verdict === 'Good'
            ? 'good'
            : (totalPrecip >= 0.2 ? 'bad' : (maxWind >= 6 ? 'fair' : 'bad')));

        // Heading
        const h2 = document.createElement('h2');
        h2.className = 'verdict';
        h2.textContent = `${labelPrefix} ${verdictText}`;
        card.appendChild(h2);

        // Bullet list
        const ul = document.createElement('ul');

        // Precipitation
        const li1 = document.createElement('li');
        li1.textContent = `☔️ Total precipitation: ${totalPrecip.toFixed(1)} mm`;
        ul.appendChild(li1);

        // Wind
        const li2 = document.createElement('li');
        li2.textContent = `💨 Wind: ${maxWind.toFixed(1)} m/s`;
        ul.appendChild(li2);

        // Humidity
        const li3 = document.createElement('li');
        li3.textContent = `💧 Relative humidity: ${avgRh}%`;
        ul.appendChild(li3);

        // Best window or reason
        const li4 = document.createElement('li');
        if (dayGoodInfo.verdict === 'Good') {
          li4.textContent = `👍 Best window: ${findBestWindow(indices, times, goodFlags)}`;
        } else {
          if (totalPrecip >= 0.2) {
            li4.textContent = `⚠️ Rain likely — outdoor drying unreliable`;
          } else if (maxWind >= 6) {
            li4.textContent = `⚠️ Strong wind — secure lighter items`;
          } else {
            li4.textContent = `⚠️ High humidity may slow drying`;
          }
        }
        ul.appendChild(li4);

        card.appendChild(ul);
        container.appendChild(card);

        // Hourly details (secondary, summary not bold)
        const details = document.createElement('details');
        details.open = false;

        const summary = document.createElement('summary');
        summary.textContent = `Show hourly details for ${dayName}`;
        details.appendChild(summary);

        const list = document.createElement('div');
        list.className = 'meta';

        indices.forEach(i => {
          const d = new Date(times[i]);
          const timeLabel = `${formatTime12(d)}`;
          const totalPrecipHour =
            ((rain && rain[i]) || 0) +
            ((showers && showers[i]) || 0) +
            ((snowfall && snowfall[i]) || 0);

          const row = document.createElement('div');
          row.className = 'hour-row';
          row.innerHTML =
            `<div class="hour-left"><strong>${timeLabel}</strong></div>` +
            `<div class="hour-right">☔️ ${totalPrecipHour.toFixed(1)} mm · ` +
            `💨 ${wind[i]} m/s · relative humidity ${rh[i]}% · ` +
            `${goodFlags[i] ? 'Good' : 'Poor'}</div>`;

          list.appendChild(row);
        });

        details.appendChild(list);
        card.appendChild(details);
      });
    }

    // Main evaluation
    function evaluateForecastAndRender(data, locationLabel) {
      const times = data.hourly.time;
      const rain = data.hourly.rain || [];
      const showers = data.hourly.showers || [];
      const snowfall = data.hourly.snowfall || [];
      const wind = data.hourly.windspeed_10m || [];
      const rh = data.hourly.relativehumidity_2m || [];

      const goodFlags = times.map((t, i) => isGoodHour(rain[i], showers[i], snowfall[i], wind[i], rh[i]));

      // Render combined weekly summary + location as a bold bullet list
      renderWeeklyList(locationLabel, times, goodFlags);

      renderDaySummaries(times, rain, showers, snowfall, wind, rh, goodFlags);
    }

    // UI wiring and behaviour for mutual exclusivity and suggestion selection
    const placeInput = document.getElementById('place');
    const suggestionsEl = document.getElementById('suggestions');
    const useLocBtn = document.getElementById('useLoc');

    function debounce(fn, ms=300){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

    const doSuggest = debounce(async () => {
      const q = placeInput.value.trim();
      suggestionsEl.innerHTML = '';
      if (!q) return;
      try {
        const geo = await geocode(q);
        if (!geo.results || geo.results.length === 0) {
          suggestionsEl.textContent = 'No matches';
          return;
        }
        geo.results.forEach(r => {
          const div = document.createElement('div');
          div.style.padding = '0.4rem';
          div.style.cursor = 'pointer';
          div.textContent = r.name + (r.admin1 ? ', ' + r.admin1 : '') + (r.country ? ', ' + r.country : '');
          div.onclick = () => {
            // When user selects a suggestion, treat that as the chosen location
            placeInput.value = div.textContent;
            suggestionsEl.innerHTML = '';
            fetchForecast(r.latitude, r.longitude).then(data => evaluateForecastAndRender(data, div.textContent)).catch(e => alert(e.message));
          };
          suggestionsEl.appendChild(div);
        });
      } catch (e) {
        suggestionsEl.textContent = 'Lookup error';
      }
    }, 300);

    // When user types, de-emphasise the "Use my location" primary state
    placeInput.addEventListener('input', () => {
      const hasText = placeInput.value.trim().length > 0;
      if (hasText) {
        useLocBtn.setAttribute('aria-pressed', 'false');
      }
      doSuggest();
    });

    // Use my location: primary path. When used, clear manual input to avoid confusion.
    // This handler now reverse-geocodes coordinates to a friendly place name before rendering.
    useLocBtn.addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser.');
        return;
      }
      // Indicate primary option chosen
      useLocBtn.setAttribute('aria-pressed', 'true');
      placeInput.value = '';
      suggestionsEl.innerHTML = '';

      navigator.geolocation.getCurrentPosition(async p => {
        const lat = p.coords.latitude.toFixed(4);
        const lon = p.coords.longitude.toFixed(4);

        try {
          // Fetch forecast and reverse-geocode in parallel for speed
          const [data, placeLabel] = await Promise.all([
            fetchForecast(lat, lon),
            reverseGeocode(lat, lon)
          ]);

          // If reverse geocode returned a label, use it; otherwise fall back to a readable fallback
          // Prefer a human-friendly place name when available
          const label = placeLabel || `Detected location (${lat}, ${lon})`;
          evaluateForecastAndRender(data, label);
        } catch (err) {
          alert('Unable to fetch weather or location name. ' + (err && err.message ? err.message : ''));
        }
      }, err => {
        alert('Location denied or unavailable');
      });
    });

    // On load: no default location, weekly summary hidden
    window.addEventListener('load', () => {
      placeInput.value = '';
      suggestionsEl.innerHTML = '';
      document.getElementById('weeklySummary').hidden = true;
      document.getElementById('locationName').textContent = '—';
      useLocBtn.setAttribute('aria-pressed', 'false');
    });
  </script>
</body>
</html>
